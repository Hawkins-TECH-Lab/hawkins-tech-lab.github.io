name: Update Publications

on:
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at midnight UTC
  workflow_dispatch: # Allows you to trigger it manually from the "Actions" tab

jobs:
  update-pubs:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to allow the bot to commit changes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # <-- This caches your venv packages so future runs are lightning fast!
          
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        
      - name: Fetch latest publications
        run: python scripts/update_pubs.py
        
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # Only add if the file was updated
          if [[ -n $(git status --porcelain) ]]; then
            git add publications/publications_by_topic.yml
            git commit -m "Auto-update publications from arXiv [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
# Install Quarto (required)
      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

# Quarto handles the build AND the gh-pages push all in one step!
      - name: Render and Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
