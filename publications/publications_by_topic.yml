- title: Multi-Scale Land Use Impacts on Fossil Fuel-Related CO$_2$ Emissions in the
    United States
  description: Anthropogenic greenhouse gas (GHG) emissions exhibit spatial variation
    owing to differences in development patterns, local climate, economic composition,
    energy sources, and other factors. Many of these factors - and therefore their
    contribution to GHG production - are influenceable through spatial planning and
    economic policy. Recent advances in environmental data reporting and climate flux
    measurement have produced high fidelity GHG emissions estimates at detailed spatial
    and temporal resolutions. Using one such dataset (Vulcan v3.0 1-km gridcell estimates
    of fossil-fuel CO2 for the U.S.), we explore the relationship between land use
    features and CO2 emissions. Analysis is conducted at multiple scales (neighbourhoods
    and metropolitan areas) to explore scale law effects. Using a data-driven propensity
    score approach, we develop doubly robust causal estimands for the effects of multiple
    land use features on CO2 emissions by sector. Preliminary results suggest that
    per capita transportation emissions are not significantly affected by local population
    density after controlling for metropolitan population density factors. However,
    results are likely influenced by the way transportation emissions are allocated
    in the Vulcan dataset. Results for scope 2 residential electricity and non-electricity
    energy are also considered in the study.
